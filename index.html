<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таймлайн тестов Q2 2026</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e2e4eb;
  --text-dim: #8b8fa3;
  --done: #1a7a4c;
  --done-text: #5afa9e;
  --testing: #1a4a7a;
  --testing-text: #5ab8fa;
  --wip: #7c6a1a;
  --wip-text: #fcd34d;
  --backlog: #3b3f54;
  --backlog-text: #a0a4ba;
  --accent: #6366f1;
  --march-bg: #13151f;
  --drop-hl: rgba(99,102,241,0.15);
  --drop-bd: rgba(99,102,241,0.5);
  --danger: #dc2626;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); padding:24px 32px; min-width:1200px; }
h1 { font-size:24px; font-weight:700; margin-bottom:4px; }
.subtitle { color:var(--text-dim); font-size:13px; margin-bottom:20px; }

/* Top bar */
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.legend { display:flex; gap:20px; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-dim); }
.legend-dot { width:11px; height:11px; border-radius:3px; }
.legend-dot.done { background:var(--done); }
.legend-dot.testing { background:var(--testing); }
.legend-dot.wip { background:var(--wip); }
.legend-dot.backlog { background:var(--backlog); }
.actions { display:flex; gap:8px; align-items:center; }
.btn { padding:7px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
.btn:hover { background:var(--surface2); color:var(--text); border-color:var(--accent); }
.btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.primary:hover { opacity:.85; }
.btn.danger { border-color:var(--danger); color:var(--danger); }
.btn.danger:hover { background:var(--danger); color:#fff; }
.unsaved-badge { background:var(--wip); color:var(--wip-text); font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; display:none; }
.unsaved-badge.visible { display:inline-block; }

/* Grid */
.timeline { display:grid; grid-template-columns:200px repeat(4,1fr); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.header { background:var(--surface2); padding:12px 14px; font-weight:600; font-size:14px; text-align:center; border-bottom:2px solid var(--border); }
.header:first-child { text-align:left; color:var(--text-dim); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
.header-march { color:var(--done-text); opacity:.7; }
.month-now::after { content:"сейчас"; background:var(--accent); color:#fff; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:2px 6px; border-radius:3px; margin-left:6px; }
.layer-label { grid-column:1/-1; background:var(--surface); padding:8px 14px; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:var(--accent); border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.layer-label .li { width:3px; height:16px; background:var(--accent); border-radius:2px; }
.platform-label { padding:6px 14px; font-size:11px; font-weight:600; color:var(--text-dim); background:var(--bg); border-top:1px solid var(--border); display:flex; align-items:center; gap:5px; }

.cell { padding:6px 8px; border-top:1px solid var(--border); border-left:1px solid var(--border); background:var(--bg); display:flex; flex-direction:column; gap:5px; min-height:50px; transition:background .15s; position:relative; }
.cell.march { background:var(--march-bg); }
.cell.drag-over { background:var(--drop-hl); outline:2px dashed var(--drop-bd); outline-offset:-2px; }

/* Add button in cell */
.cell-add { display:none; align-items:center; justify-content:center; width:100%; padding:4px; border-radius:5px; border:1px dashed var(--border); color:var(--text-dim); font-size:16px; cursor:pointer; transition:all .15s; background:transparent; }
.cell:hover .cell-add { display:flex; }
.cell-add:hover { border-color:var(--accent); color:var(--accent); background:rgba(99,102,241,.08); }

/* Card */
.card { display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:6px; font-size:11px; font-weight:500; line-height:1.3; cursor:grab; user-select:none; position:relative; transition:transform .12s,box-shadow .12s,opacity .12s; }
.card:active { cursor:grabbing; }
.card.dragging { opacity:.25; transform:scale(.95); }
.card:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.3); }
.card.done { background:var(--done); color:var(--done-text); }
.card.testing { background:var(--testing); color:var(--testing-text); }
.card.wip { background:var(--wip); color:var(--wip-text); }
.card.backlog { background:var(--backlog); color:var(--backlog-text); }
.card .icon { font-size:10px; flex-shrink:0; }
.card .card-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; }
.card .card-del { display:none; font-size:13px; line-height:1; cursor:pointer; opacity:.6; padding:0 2px; flex-shrink:0; }
.card .card-del:hover { opacity:1; }
.card:hover .card-del { display:block; }

/* Status dropdown */
.status-dd { position:absolute; top:100%; left:0; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:4px; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.5); min-width:150px; display:none; }
.status-dd.open { display:block; }
.status-dd-item { padding:6px 10px; font-size:11px; cursor:pointer; border-radius:5px; display:flex; align-items:center; gap:7px; color:var(--text); }
.status-dd-item:hover { background:rgba(99,102,241,.15); }
.status-dd-item .sd-dot { width:9px; height:9px; border-radius:3px; flex-shrink:0; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; display:none; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:400px; max-width:90vw; }
.modal h2 { font-size:16px; margin-bottom:16px; }
.modal label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px; margin-top:12px; }
.modal input, .modal select { width:100%; padding:8px 10px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; outline:none; }
.modal input:focus, .modal select:focus { border-color:var(--accent); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }

/* Stats */
.stats { margin-top:20px; display:flex; gap:14px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; flex:1; }
.stat-card .number { font-size:26px; font-weight:700; }
.stat-card .label { font-size:11px; color:var(--text-dim); margin-top:2px; }
.stat-card.s-done .number { color:var(--done-text); }
.stat-card.s-testing .number { color:var(--testing-text); }
.stat-card.s-wip .number { color:var(--wip-text); }
.stat-card.s-backlog .number { color:var(--backlog-text); }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; background:var(--surface2); border:1px solid var(--accent); color:var(--text); padding:10px 18px; border-radius:8px; font-size:13px; opacity:0; transform:translateY(10px); transition:all .3s; pointer-events:none; z-index:200; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.error { border-color:var(--danger); color:#fca5a5; }
</style>
</head>
<body>

<h1>Таймлайн тестов Conversion Team — Q1–Q2 2026</h1>
<p class="subtitle">Перетаскивайте карточки · Клик — сменить статус · Hover — кнопки +/×</p>

<div class="top-bar">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot done"></div> Тест завершён</div>
    <div class="legend-item"><div class="legend-dot testing"></div> В тесте</div>
    <div class="legend-item"><div class="legend-dot wip"></div> В работе</div>
    <div class="legend-item"><div class="legend-dot backlog"></div> Бэклог</div>
  </div>
  <div class="actions">
    <span class="unsaved-badge" id="unsavedBadge">несохранённые изменения</span>
    <button class="btn" id="btnSettings" title="Настройки GitLab">⚙ Настройки</button>
    <button class="btn primary" id="btnSave">Сохранить</button>
  </div>
</div>

<div class="timeline" id="timeline"></div>

<div class="stats" id="stats"></div>

<!-- Add card modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Новая карточка</h2>
    <label>Название теста</label>
    <input type="text" id="addName" placeholder="Название теста...">
    <label>Статус</label>
    <select id="addStatus">
      <option value="backlog">Бэклог</option>
      <option value="wip">В работе</option>
      <option value="testing">В тесте</option>
      <option value="done">Тест завершён</option>
    </select>
    <div class="modal-actions">
      <button class="btn" id="addCancel">Отмена</button>
      <button class="btn primary" id="addConfirm">Добавить</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Настройки Git-хостинга</h2>
    <label>Платформа</label>
    <select id="setPlatform">
      <option value="github">GitHub</option>
      <option value="gitlab">GitLab</option>
    </select>
    <label>Owner / Repository (например: user/repo)</label>
    <input type="text" id="setRepo" placeholder="palinamushtukova/ewa">
    <label>Personal Access Token</label>
    <input type="password" id="setToken" placeholder="ghp_... или glpat-...">
    <label>Branch</label>
    <input type="text" id="setBranch" placeholder="main" value="main">
    <label>Путь к JSON в репо</label>
    <input type="text" id="setPath" placeholder="timeline-data.json" value="timeline-data.json">
    <div class="modal-actions">
      <button class="btn" id="setCancel">Отмена</button>
      <button class="btn primary" id="setSave">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LS_DATA = 'tl-data-v3';
const LS_SETTINGS = 'tl-gitlab-settings';
const PLATFORMS = ['android', 'ios'];
const PLATFORM_LABELS = { android: '🤖 Android', ios: '🍎 iOS' };
const STATUS_ORDER = ['done', 'testing', 'wip', 'backlog'];
const STATUS_META = {
  done:    { label: 'Тест завершён', icon: '✓', dotVar: '--done' },
  testing: { label: 'В тесте',      icon: '▶', dotVar: '--testing' },
  wip:     { label: 'В работе',     icon: '⚙', dotVar: '--wip' },
  backlog: { label: 'Бэклог',       icon: '',  dotVar: '--backlog' }
};

let data = null;
let dirty = false;
let dragCard = null;
let addTarget = null;

// ── Helpers ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

function markDirty() {
  dirty = true;
  document.getElementById('unsavedBadge').classList.add('visible');
  localStorage.setItem(LS_DATA, JSON.stringify(data));
}

function markClean() {
  dirty = false;
  document.getElementById('unsavedBadge').classList.remove('visible');
}

// ── Render ──
function render() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  const months = data.months;

  // Header row
  tl.appendChild(el('div', 'header', 'Слой / Платформа'));
  months.forEach((m, i) => {
    const cls = 'header' + (i === 0 ? ' header-march' : '') + (i === 1 ? ' month-now' : '');
    tl.appendChild(el('div', cls, m.label));
  });

  // Layers
  data.layers.forEach(layer => {
    const lbl = document.createElement('div');
    lbl.className = 'layer-label';
    lbl.innerHTML = `<div class="li"></div>${esc(layer.name)}`;
    tl.appendChild(lbl);

    PLATFORMS.forEach(platform => {
      const plbl = el('div', 'platform-label', PLATFORM_LABELS[platform]);
      tl.appendChild(plbl);

      months.forEach(month => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (month.id === 'mar' ? ' march' : '');
        cell.dataset.layer = layer.id;
        cell.dataset.platform = platform;
        cell.dataset.month = month.id;

        const cards = layer.cards.filter(c => c.platform === platform && c.month === month.id);
        cards.forEach(card => cell.appendChild(renderCard(card)));

        const addBtn = document.createElement('button');
        addBtn.className = 'cell-add';
        addBtn.textContent = '+';
        addBtn.addEventListener('click', () => openAddModal(layer.id, platform, month.id));
        cell.appendChild(addBtn);

        tl.appendChild(cell);
      });
    });
  });

  updateStats();
  setupDragDrop();
}

function renderCard(card) {
  const d = document.createElement('div');
  d.className = 'card ' + card.status;
  d.draggable = true;
  d.dataset.cardId = card.id;

  const meta = STATUS_META[card.status];
  if (meta.icon) {
    const ic = document.createElement('span');
    ic.className = 'icon';
    ic.textContent = meta.icon;
    d.appendChild(ic);
  }

  const name = document.createElement('span');
  name.className = 'card-name';
  name.textContent = card.name;
  d.appendChild(name);

  const del = document.createElement('span');
  del.className = 'card-del';
  del.textContent = '×';
  del.addEventListener('click', e => {
    e.stopPropagation();
    if (confirm(`Удалить «${card.name}»?`)) {
      deleteCard(card.id);
    }
  });
  d.appendChild(del);

  d.addEventListener('click', e => {
    if (e.target.classList.contains('card-del')) return;
    openStatusDropdown(d, card);
  });

  return d;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  e.className = cls;
  if (text) e.textContent = text;
  return e;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Stats (unique by name + platform, takes the "latest" status per timeline order) ──
function updateStats() {
  const statusPriority = { done: 0, testing: 1, wip: 2, backlog: 3 };
  const monthOrder = {};
  data.months.forEach((m, i) => monthOrder[m.id] = i);

  const unique = new Map();
  data.layers.flatMap(l => l.cards).forEach(c => {
    const key = c.name + '||' + c.platform;
    const prev = unique.get(key);
    if (!prev || monthOrder[c.month] > monthOrder[prev.month]) {
      unique.set(key, c);
    }
  });

  const counts = { done: 0, testing: 0, wip: 0, backlog: 0 };
  unique.forEach(c => counts[c.status]++);
  const total = unique.size;

  const st = document.getElementById('stats');
  st.innerHTML = `
    <div class="stat-card s-done"><div class="number">${counts.done}</div><div class="label">Тесты завершены</div></div>
    <div class="stat-card s-testing"><div class="number">${counts.testing}</div><div class="label">В тесте</div></div>
    <div class="stat-card s-wip"><div class="number">${counts.wip}</div><div class="label">В работе</div></div>
    <div class="stat-card s-backlog"><div class="number">${counts.backlog}</div><div class="label">Бэклог</div></div>
    <div class="stat-card"><div class="number" style="color:var(--text)">${total}</div><div class="label">Уникальных тестов</div></div>
  `;
}

// ── Status Dropdown ──
function openStatusDropdown(cardEl, card) {
  closeAllDropdowns();
  const cell = cardEl.closest('.cell');
  if (cell) cell.style.zIndex = '60';

  const dd = document.createElement('div');
  dd.className = 'status-dd open';
  STATUS_ORDER.forEach(s => {
    const item = document.createElement('div');
    item.className = 'status-dd-item';
    item.innerHTML = `<div class="sd-dot" style="background:var(${STATUS_META[s].dotVar})"></div>${STATUS_META[s].label}`;
    if (s === card.status) item.style.fontWeight = '700';
    item.addEventListener('click', e => {
      e.stopPropagation();
      card.status = s;
      markDirty();
      render();
    });
    dd.appendChild(item);
  });
  cardEl.style.position = 'relative';
  cardEl.appendChild(dd);
  setTimeout(() => document.addEventListener('click', closeAllDropdowns, { once: true }), 0);
}

function closeAllDropdowns() {
  document.querySelectorAll('.cell').forEach(c => c.style.zIndex = '');
  document.querySelectorAll('.status-dd').forEach(d => d.remove());
}

// ── Add Card ──
function openAddModal(layerId, platform, month) {
  addTarget = { layerId, platform, month };
  document.getElementById('addName').value = '';
  document.getElementById('addStatus').value = 'backlog';
  document.getElementById('addModal').classList.add('open');
  document.getElementById('addName').focus();
}

document.getElementById('addCancel').addEventListener('click', () => {
  document.getElementById('addModal').classList.remove('open');
});

document.getElementById('addConfirm').addEventListener('click', () => {
  const name = document.getElementById('addName').value.trim();
  if (!name) return;
  const status = document.getElementById('addStatus').value;
  const layer = data.layers.find(l => l.id === addTarget.layerId);
  if (!layer) return;
  layer.cards.push({
    id: uid(),
    name,
    platform: addTarget.platform,
    month: addTarget.month,
    status
  });
  document.getElementById('addModal').classList.remove('open');
  markDirty();
  render();
});

// ── Delete Card ──
function deleteCard(cardId) {
  data.layers.forEach(layer => {
    layer.cards = layer.cards.filter(c => c.id !== cardId);
  });
  markDirty();
  render();
}

// ── Drag & Drop ──
function setupDragDrop() {
  document.querySelectorAll('.card').forEach(c => {
    c.addEventListener('dragstart', e => {
      dragCard = c.dataset.cardId;
      c.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    });
    c.addEventListener('dragend', () => {
      c.classList.remove('dragging');
      dragCard = null;
      document.querySelectorAll('.cell.drag-over').forEach(cl => cl.classList.remove('drag-over'));
    });
  });

  document.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('dragover', e => {
      if (!dragCard) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.cell.drag-over').forEach(cl => cl.classList.remove('drag-over'));
      cell.classList.add('drag-over');
    });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drag-over');
      if (!dragCard) return;
      const targetLayer = cell.dataset.layer;
      const targetPlatform = cell.dataset.platform;
      const targetMonth = cell.dataset.month;

      let card = null;
      let sourceLayer = null;
      data.layers.forEach(l => {
        const idx = l.cards.findIndex(c => c.id === dragCard);
        if (idx !== -1) {
          card = l.cards.splice(idx, 1)[0];
          sourceLayer = l;
        }
      });
      if (!card) return;

      card.platform = targetPlatform;
      card.month = targetMonth;
      const destLayer = data.layers.find(l => l.id === targetLayer);
      if (destLayer) destLayer.cards.push(card);

      dragCard = null;
      markDirty();
      render();
    });
  });
}

// ── Git API (GitHub + GitLab) ──
function getSettings() {
  try { return JSON.parse(localStorage.getItem(LS_SETTINGS)) || {}; } catch { return {}; }
}

function saveSettings(s) {
  localStorage.setItem(LS_SETTINGS, JSON.stringify(s));
}

function apiHeaders(s) {
  if (s.platform === 'gitlab') return { 'PRIVATE-TOKEN': s.token, 'Content-Type': 'application/json' };
  return { 'Authorization': 'Bearer ' + s.token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' };
}

async function loadFromRemote() {
  const s = getSettings();
  if (!s.repo || !s.token) return null;
  const branch = s.branch || 'main';
  const path = s.path || 'timeline-data.json';
  let url;
  if (s.platform === 'gitlab') {
    const projId = encodeURIComponent(s.repo);
    url = `https://gitlab.com/api/v4/projects/${projId}/repository/files/${encodeURIComponent(path)}?ref=${branch}`;
  } else {
    url = `https://api.github.com/repos/${s.repo}/contents/${path}?ref=${branch}`;
  }
  try {
    const resp = await fetch(url, { headers: apiHeaders(s) });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    const content = atob(json.content);
    return { data: JSON.parse(content), sha: json.sha || null };
  } catch (e) {
    console.error('Remote load failed:', e);
    return null;
  }
}

let remoteSha = null;

async function saveToRemote() {
  const s = getSettings();
  if (!s.repo || !s.token) {
    document.getElementById('settingsModal').classList.add('open');
    toast('Сначала настройте подключение', true);
    return;
  }
  const branch = s.branch || 'main';
  const path = s.path || 'timeline-data.json';
  const content = JSON.stringify(data, null, 2);
  const message = `Update timeline ${new Date().toISOString().slice(0, 16)}`;

  document.getElementById('btnSave').textContent = 'Сохраняю...';
  document.getElementById('btnSave').disabled = true;

  try {
    let url, body, method;
    if (s.platform === 'gitlab') {
      const projId = encodeURIComponent(s.repo);
      url = `https://gitlab.com/api/v4/projects/${projId}/repository/files/${encodeURIComponent(path)}`;
      body = { branch, content, commit_message: message };
      method = 'PUT';
    } else {
      url = `https://api.github.com/repos/${s.repo}/contents/${path}`;
      body = { message, content: btoa(unescape(encodeURIComponent(content))), branch };
      if (remoteSha) body.sha = remoteSha;
      method = 'PUT';
    }
    const resp = await fetch(url, { method, headers: apiHeaders(s), body: JSON.stringify(body) });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${resp.status}`);
    }
    const result = await resp.json();
    if (result.content && result.content.sha) remoteSha = result.content.sha;
    markClean();
    toast('Сохранено в ' + (s.platform === 'gitlab' ? 'GitLab' : 'GitHub'));
  } catch (e) {
    toast('Ошибка: ' + e.message, true);
  } finally {
    document.getElementById('btnSave').textContent = 'Сохранить';
    document.getElementById('btnSave').disabled = false;
  }
}

});

});

document.getElementById('setSave').addEventListener('click', () => {
  saveSettings({
    platform: document.getElementById('setPlatform').value,
    repo: document.getElementById('setRepo').value.trim(),
    token: document.getElementById('setToken').value.trim(),
    branch: document.getElementById('setBranch').value.trim() || 'main',

// ── Init ──
async function init() {
  const cached = localStorage.getItem(LS_DATA);
  if (cached) {
    try { data = JSON.parse(cached); } catch { data = null; }
  }

  const remote = await loadFromRemote();
  if (remote) {
    remoteSha = remote.sha;
    if (!dirty) {
      data = remote.data;
      localStorage.setItem(LS_DATA, JSON.stringify(data));
      markClean();
    }
  }

  if (!data) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    localStorage.setItem(LS_DATA, JSON.stringify(data));
  }

  render();
}

init();
