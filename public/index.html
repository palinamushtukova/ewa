<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversion Team — Timeline Q2 2026</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e2e4eb;
  --text-dim: #8b8fa3;
  --done: #1a7a4c;
  --done-text: #5afa9e;
  --testing: #1a4a7a;
  --testing-text: #5ab8fa;
  --wip: #7c6a1a;
  --wip-text: #fcd34d;
  --backlog: #3b3f54;
  --backlog-text: #a0a4ba;
  --accent: #6366f1;
  --march-bg: #13151f;
  --drop-hl: rgba(99,102,241,0.15);
  --drop-bd: rgba(99,102,241,0.5);
  --danger: #dc2626;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); padding:24px 32px; min-width:1200px; }
h1 { font-size:24px; font-weight:700; margin-bottom:4px; }
.subtitle { color:var(--text-dim); font-size:13px; margin-bottom:20px; }

.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.legend { display:flex; gap:20px; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-dim); }
.legend-dot { width:11px; height:11px; border-radius:3px; }
.legend-dot.done { background:var(--done); }
.legend-dot.testing { background:var(--testing); }
.legend-dot.wip { background:var(--wip); }
.legend-dot.backlog { background:var(--backlog); }
.actions { display:flex; gap:8px; align-items:center; }
.btn { padding:7px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
.btn:hover { background:var(--surface2); color:var(--text); border-color:var(--accent); }
.btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.primary:hover { opacity:.85; }
.unsaved-badge { background:var(--wip); color:var(--wip-text); font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; display:none; }
.unsaved-badge.visible { display:inline-block; }

.timeline { display:grid; grid-template-columns:200px repeat(4,1fr); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.header { background:var(--surface2); padding:12px 14px; font-weight:600; font-size:14px; text-align:center; border-bottom:2px solid var(--border); }
.header:first-child { text-align:left; color:var(--text-dim); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
.header-march { color:var(--done-text); opacity:.7; }
.month-now::after { content:"now"; background:var(--accent); color:#fff; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; padding:2px 6px; border-radius:3px; margin-left:6px; }
.layer-label { grid-column:1/-1; background:var(--surface); padding:8px 14px; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:var(--accent); border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.layer-label .li { width:3px; height:16px; background:var(--accent); border-radius:2px; }
.platform-label { padding:6px 14px; font-size:11px; font-weight:600; color:var(--text-dim); background:var(--bg); border-top:1px solid var(--border); display:flex; align-items:center; gap:5px; }

.cell { padding:6px 8px; border-top:1px solid var(--border); border-left:1px solid var(--border); background:var(--bg); display:flex; flex-direction:column; gap:5px; min-height:50px; transition:background .15s; position:relative; }
.cell.march { background:var(--march-bg); }
.cell.drag-over { background:var(--drop-hl); outline:2px dashed var(--drop-bd); outline-offset:-2px; }
.cell-add { display:none; align-items:center; justify-content:center; width:100%; padding:4px; border-radius:5px; border:1px dashed var(--border); color:var(--text-dim); font-size:16px; cursor:pointer; transition:all .15s; background:transparent; }
.editing .cell:hover .cell-add { display:flex; }
.cell-add:hover { border-color:var(--accent); color:var(--accent); background:rgba(99,102,241,.08); }

.card { display:flex; flex-direction:column; gap:2px; padding:5px 10px; border-radius:6px; font-size:11px; font-weight:500; line-height:1.3; position:relative; transition:transform .12s,box-shadow .12s,opacity .12s; }
.editing .card { cursor:grab; user-select:none; }
.editing .card:active { cursor:grabbing; }
.card.dragging { opacity:.25; transform:scale(.95); }
.editing .card:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.3); }
.card.done { background:var(--done); color:var(--done-text); }
.card.testing { background:var(--testing); color:var(--testing-text); }
.card.wip { background:var(--wip); color:var(--wip-text); }
.card.backlog { background:var(--backlog); color:var(--backlog-text); }
.card-row { display:flex; align-items:center; gap:5px; width:100%; }
.card .icon { font-size:10px; flex-shrink:0; }
.card .card-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card .card-del { display:none; font-size:13px; line-height:1; cursor:pointer; opacity:.6; padding:0 2px; flex-shrink:0; }
.card .card-del:hover { opacity:1; }
.editing .card:hover .card-del { display:block; }
.card-meta { display:flex; gap:8px; font-size:9px; opacity:.7; }
.card-meta-field { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:90px; }
.editing .card-meta-field { cursor:text; }
.card-meta-field:empty::before { content:attr(data-placeholder); opacity:.4; }
.card-meta-input { width:70px; font-size:9px; padding:0 3px; border:1px solid rgba(255,255,255,.25); border-radius:3px; background:rgba(0,0,0,.3); color:inherit; outline:none; font-family:inherit; }
.card-meta-input:focus { border-color:var(--accent); }

.status-dd { position:absolute; top:100%; left:0; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:4px; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.5); min-width:150px; display:none; }
.status-dd.open { display:block; }
.status-dd-item { padding:6px 10px; font-size:11px; cursor:pointer; border-radius:5px; display:flex; align-items:center; gap:7px; color:var(--text); }
.status-dd-item:hover { background:rgba(99,102,241,.15); }
.status-dd-item .sd-dot { width:9px; height:9px; border-radius:3px; flex-shrink:0; }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; display:none; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; width:400px; max-width:90vw; }
.modal h2 { font-size:16px; margin-bottom:16px; }
.modal label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px; margin-top:12px; }
.modal input, .modal select { width:100%; padding:8px 10px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; outline:none; }
.modal input:focus, .modal select:focus { border-color:var(--accent); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
.modal .error-msg { color:#fca5a5; font-size:12px; margin-top:8px; display:none; }
.modal .error-msg.visible { display:block; }

.stats { margin-top:20px; display:flex; gap:14px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; flex:1; }
.stat-card .number { font-size:26px; font-weight:700; }
.stat-card .label { font-size:11px; color:var(--text-dim); margin-top:2px; }
.stat-card.s-done .number { color:var(--done-text); }
.stat-card.s-testing .number { color:var(--testing-text); }
.stat-card.s-wip .number { color:var(--wip-text); }
.stat-card.s-backlog .number { color:var(--backlog-text); }

.toast { position:fixed; bottom:24px; right:24px; background:var(--surface2); border:1px solid var(--accent); color:var(--text); padding:10px 18px; border-radius:8px; font-size:13px; opacity:0; transform:translateY(10px); transition:all .3s; pointer-events:none; z-index:200; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.error { border-color:var(--danger); color:#fca5a5; }
</style>

// ── Helpers ──
function decodeBase64UTF8(b64) {
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function toast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function makeEl(tag, cls, text) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text) e.textContent = text;
  return e;
}

function markDirty() {
  dirty = true;
  var badge = document.getElementById('unsavedBadge');
  if (badge) badge.classList.add('visible');
}

function markClean() {
  dirty = false;
  var badge = document.getElementById('unsavedBadge');
  if (badge) badge.classList.remove('visible');
}

// ── Mode switching ──
function setMode(isEdit) {
  editMode = isEdit;
  document.body.classList.toggle('editing', isEdit);
  document.getElementById('subtitle').textContent = isEdit
    ? 'Edit mode \u2014 drag cards \u00B7 click = change status \u00B7 hover = +/\u00D7'
    : 'Read-only';
  renderActionBar();
  render();
}

function renderActionBar() {
  var bar = document.getElementById('actionBar');
  bar.innerHTML = '';

  if (editMode) {
    var badge = makeEl('span', 'unsaved-badge', 'unsaved changes');
    badge.id = 'unsavedBadge';
    if (dirty) badge.classList.add('visible');
    bar.appendChild(badge);

    var btnSave = makeEl('button', 'btn primary', 'Save');
    btnSave.id = 'btnSave';
    btnSave.addEventListener('click', saveToRemote);
    bar.appendChild(btnSave);

    var btnExit = makeEl('button', 'btn', 'Exit edit');
    btnExit.addEventListener('click', function() {
      if (dirty && !confirm('You have unsaved changes. Exit anyway?')) return;
      sessionStorage.removeItem('gh-token');
      dirty = false;
      setMode(false);
      init();
    });
    bar.appendChild(btnExit);
  } else {
    var btnEdit = makeEl('button', 'btn primary', 'Edit');
    btnEdit.addEventListener('click', function() {
      var saved = sessionStorage.getItem('gh-token');
      if (saved) { setMode(true); return; }
      document.getElementById('authToken').value = '';
      document.getElementById('authError').classList.remove('visible');
      document.getElementById('authModal').classList.add('open');
      document.getElementById('authToken').focus();
    });
    bar.appendChild(btnEdit);
  }
}

// ── Auth modal ──
document.getElementById('authCancel').addEventListener('click', function() {
  document.getElementById('authModal').classList.remove('open');
});

document.getElementById('authSubmit').addEventListener('click', async function() {
  var token = document.getElementById('authToken').value.trim();
  if (!token) return;
  var errEl = document.getElementById('authError');
  errEl.classList.remove('visible');
  var btn = document.getElementById('authSubmit');
  btn.textContent = 'Checking...';
  btn.disabled = true;

  try {
    var url = 'https://api.github.com/repos/' + CONFIG.repo + '/contents/' + CONFIG.jsonPath + '?ref=' + CONFIG.branch;
    var resp = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }
    });
    if (!resp.ok) throw new Error('Invalid token or no access (HTTP ' + resp.status + ')');
    var json = await resp.json();
    remoteSha = json.sha;
    data = JSON.parse(decodeBase64UTF8(json.content));
    sessionStorage.setItem('gh-token', token);
    document.getElementById('authModal').classList.remove('open');
    setMode(true);
    toast('Loaded from GitHub');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('visible');
  } finally {
    btn.textContent = 'Unlock';
    btn.disabled = false;
  }
});

document.getElementById('authToken').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('authSubmit').click();
});

// ── Render ──
function render() {
  var tl = document.getElementById('timeline');
  tl.innerHTML = '';
  if (!data) return;

  tl.appendChild(makeEl('div', 'header', 'Layer / Platform'));
  data.months.forEach(function(m, i) {
    var cls = 'header' + (i === 0 ? ' header-march' : '') + (i === 1 ? ' month-now' : '');
    tl.appendChild(makeEl('div', cls, m.label));
  });

  data.layers.forEach(function(layer) {
    var lbl = document.createElement('div');
    lbl.className = 'layer-label';
    lbl.innerHTML = '<div class="li"></div>' + esc(layer.name);
    tl.appendChild(lbl);

    PLATFORMS.forEach(function(platform) {
      tl.appendChild(makeEl('div', 'platform-label', PLATFORM_LABELS[platform]));

      data.months.forEach(function(month) {
        var cell = document.createElement('div');
        cell.className = 'cell' + (month.id === 'mar' ? ' march' : '');
        cell.dataset.layer = layer.id;
        cell.dataset.platform = platform;
        cell.dataset.month = month.id;

        layer.cards
          .filter(function(c) { return c.platform === platform && c.month === month.id; })
          .forEach(function(card) { cell.appendChild(renderCard(card)); });

        if (editMode) {
          var addBtn = document.createElement('button');
          addBtn.className = 'cell-add';
          addBtn.textContent = '+';
          addBtn.addEventListener('click', function() { openAddModal(layer.id, platform, month.id); });
          cell.appendChild(addBtn);
        }

        tl.appendChild(cell);
      });
    });
  });

  updateStats();
  if (editMode) setupDragDrop();
}

function renderCard(card) {
  if (!card.qa) card.qa = '';
  if (!card.dev) card.dev = '';

  var d = document.createElement('div');
  d.className = 'card ' + card.status;
  d.draggable = editMode;
  d.dataset.cardId = card.id;

  var row = document.createElement('div');
  row.className = 'card-row';

  var meta = STATUS_META[card.status];
  if (meta.icon) row.appendChild(makeEl('span', 'icon', meta.icon));

  row.appendChild(makeEl('span', 'card-name', card.name));

  if (editMode) {
    var del = makeEl('span', 'card-del', '\u00D7');
    del.addEventListener('click', function(e) {
      e.stopPropagation();
      if (confirm('Delete \u00AB' + card.name + '\u00BB?')) deleteCard(card.id);
    });
    row.appendChild(del);
  }
  d.appendChild(row);

  var metaRow = document.createElement('div');
  metaRow.className = 'card-meta';

  var qaField = makeEl('span', 'card-meta-field', card.qa ? 'QA: ' + card.qa : '');
  qaField.dataset.placeholder = 'QA';
  qaField.dataset.field = 'qa';
  metaRow.appendChild(qaField);

  var devField = makeEl('span', 'card-meta-field', card.dev ? 'Dev: ' + card.dev : '');
  devField.dataset.placeholder = 'Dev';
  devField.dataset.field = 'dev';
  metaRow.appendChild(devField);

  if (editMode) {
    [qaField, devField].forEach(function(field) {
      field.addEventListener('click', function(e) {
        e.stopPropagation();
        var fName = field.dataset.field;
        var input = document.createElement('input');
        input.className = 'card-meta-input';
        input.value = card[fName];
        input.placeholder = field.dataset.placeholder + '...';
        field.replaceWith(input);
        input.focus();
        d.draggable = false;
        function save() {
          card[fName] = input.value.trim();
          d.draggable = true;
          markDirty();
          render();
        }
        input.addEventListener('blur', save);
        input.addEventListener('keydown', function(ev) {
          if (ev.key === 'Enter') input.blur();
          if (ev.key === 'Escape') { input.value = card[fName]; input.blur(); }
        });
      });
    });
  }

  d.appendChild(metaRow);

  if (editMode) {
    d.addEventListener('click', function(e) {
      if (e.target.closest('.card-del') || e.target.closest('.card-meta-field') || e.target.closest('.card-meta-input')) return;
      openStatusDropdown(d, card);
    });
  }

  return d;
}

// ── Stats ──
function updateStats() {
  var monthOrder = {};
  data.months.forEach(function(m, i) { monthOrder[m.id] = i; });

  var unique = new Map();
  data.layers.forEach(function(l) {
    l.cards.forEach(function(c) {
      var key = c.name + '||' + c.platform;
      var prev = unique.get(key);
      if (!prev || monthOrder[c.month] > monthOrder[prev.month]) unique.set(key, c);
    });
  });

  var counts = { done: 0, testing: 0, wip: 0, backlog: 0 };
  unique.forEach(function(c) { counts[c.status]++; });

  document.getElementById('stats').innerHTML =
    '<div class="stat-card s-done"><div class="number">' + counts.done + '</div><div class="label">Done</div></div>' +
    '<div class="stat-card s-testing"><div class="number">' + counts.testing + '</div><div class="label">In test</div></div>' +
    '<div class="stat-card s-wip"><div class="number">' + counts.wip + '</div><div class="label">In progress</div></div>' +
    '<div class="stat-card s-backlog"><div class="number">' + counts.backlog + '</div><div class="label">Backlog</div></div>' +
    '<div class="stat-card"><div class="number" style="color:var(--text)">' + unique.size + '</div><div class="label">Unique tests</div></div>';
}

// ── Status Dropdown ──
function openStatusDropdown(cardEl, card) {
  closeAllDropdowns();
  var cell = cardEl.closest('.cell');
  if (cell) cell.style.zIndex = '60';

  var dd = document.createElement('div');
  dd.className = 'status-dd open';
  STATUS_ORDER.forEach(function(s) {
    var item = document.createElement('div');
    item.className = 'status-dd-item';
    item.innerHTML = '<div class="sd-dot" style="background:var(' + STATUS_META[s].dotVar + ')"></div>' + STATUS_META[s].label;
    if (s === card.status) item.style.fontWeight = '700';
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      card.status = s;
      markDirty();
      render();
    });
    dd.appendChild(item);
  });
  cardEl.style.position = 'relative';
  cardEl.appendChild(dd);
  setTimeout(function() {
    document.addEventListener('click', closeAllDropdowns, { once: true });
  }, 0);
}

function closeAllDropdowns() {
  document.querySelectorAll('.cell').forEach(function(c) { c.style.zIndex = ''; });
  document.querySelectorAll('.status-dd').forEach(function(d) { d.remove(); });
}

// ── Add Card ──
function openAddModal(layerId, platform, month) {
  addTarget = { layerId: layerId, platform: platform, month: month };
  document.getElementById('addName').value = '';
  document.getElementById('addQa').value = '';
  document.getElementById('addDev').value = '';
  document.getElementById('addStatus').value = 'backlog';
  document.getElementById('addModal').classList.add('open');
  document.getElementById('addName').focus();
}

document.getElementById('addCancel').addEventListener('click', function() {
  document.getElementById('addModal').classList.remove('open');
});

document.getElementById('addConfirm').addEventListener('click', function() {
  var name = document.getElementById('addName').value.trim();
  if (!name) return;
  var layer = data.layers.find(function(l) { return l.id === addTarget.layerId; });
  if (!layer) return;
  layer.cards.push({
    id: uid(),
    name: name,
    qa: document.getElementById('addQa').value.trim(),
    dev: document.getElementById('addDev').value.trim(),
    platform: addTarget.platform,
    month: addTarget.month,
    status: document.getElementById('addStatus').value
  });
  document.getElementById('addModal').classList.remove('open');
  markDirty();
  render();
});

// ── Delete Card ──
function deleteCard(cardId) {
  data.layers.forEach(function(l) {
    l.cards = l.cards.filter(function(c) { return c.id !== cardId; });
  });
  markDirty();
  render();
}

// ── Drag & Drop ──
function setupDragDrop() {
  document.querySelectorAll('.card').forEach(function(c) {
    c.addEventListener('dragstart', function(e) {
      dragCard = c.dataset.cardId;
      c.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    });
    c.addEventListener('dragend', function() {
      c.classList.remove('dragging');
      dragCard = null;
      document.querySelectorAll('.cell.drag-over').forEach(function(cl) { cl.classList.remove('drag-over'); });
    });
  });

  document.querySelectorAll('.cell').forEach(function(cell) {
    cell.addEventListener('dragover', function(e) {
      if (!dragCard) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.cell.drag-over').forEach(function(cl) { cl.classList.remove('drag-over'); });
      cell.classList.add('drag-over');
    });
    cell.addEventListener('dragleave', function() { cell.classList.remove('drag-over'); });
    cell.addEventListener('drop', function(e) {
      e.preventDefault();
      cell.classList.remove('drag-over');
      if (!dragCard) return;

      var card = null;
      data.layers.forEach(function(l) {
        var idx = l.cards.findIndex(function(c) { return c.id === dragCard; });
        if (idx !== -1) card = l.cards.splice(idx, 1)[0];
      });
      if (!card) return;

      card.platform = cell.dataset.platform;
      card.month = cell.dataset.month;
      var dest = data.layers.find(function(l) { return l.id === cell.dataset.layer; });
      if (dest) dest.cards.push(card);

      dragCard = null;
      markDirty();
      render();
    });
  });
}

// ── GitHub API ──
function getToken() { return sessionStorage.getItem('gh-token'); }

async function saveToRemote() {
  var token = getToken();
  if (!token) { toast('No token', true); return; }

  var saveBtn = document.getElementById('btnSave');
  if (saveBtn) { saveBtn.textContent = 'Saving...'; saveBtn.disabled = true; }

  try {
    var getUrl = 'https://api.github.com/repos/' + CONFIG.repo + '/contents/' + CONFIG.jsonPath + '?ref=' + CONFIG.branch;
    var getResp = await fetch(getUrl, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' },
      cache: 'no-store'
    });
    if (!getResp.ok) throw new Error('Failed to get current sha (HTTP ' + getResp.status + ')');
    var getCurrent = await getResp.json();
    remoteSha = getCurrent.sha;

    var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    var putUrl = 'https://api.github.com/repos/' + CONFIG.repo + '/contents/' + CONFIG.jsonPath;
    var resp = await fetch(putUrl, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({
        message: 'Update timeline ' + new Date().toISOString().slice(0, 16),
        content: content,
        sha: remoteSha,
        branch: CONFIG.branch
      })
    });
    if (!resp.ok) {
      var err = await resp.json().catch(function() { return {}; });
      throw new Error(err.message || 'HTTP ' + resp.status);
    }
    var result = await resp.json();
    if (result.content && result.content.sha) remoteSha = result.content.sha;
    await fetch(PURGE_URL).catch(function() {});
    markClean();
    toast('Saved to GitHub');
  } catch (e) {
    toast('Error: ' + e.message, true);
  } finally {
    if (saveBtn) { saveBtn.textContent = 'Save'; saveBtn.disabled = false; }
  }
}

// ── CDN URLs (jsDelivr — instant purge, no auth for reading) ──
var CDN_URL = 'https://cdn.jsdelivr.net/gh/' + CONFIG.repo + '@' + CONFIG.branch + '/' + CONFIG.jsonPath;
var PURGE_URL = 'https://purge.jsdelivr.net/gh/' + CONFIG.repo + '@' + CONFIG.branch + '/' + CONFIG.jsonPath;

// ── Init ──
async function init() {
  try {
    var resp = await fetch(CDN_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!resp.ok) throw new Error('CDN ' + resp.status);
    data = await resp.json();
  } catch (e) {
    try {
      var localResp = await fetch('./timeline-data.json');
      if (localResp.ok) data = await localResp.json();
      else throw new Error('local failed');
    } catch (e2) {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  }
  render();
}

// Close modals on overlay click
['authModal', 'addModal'].forEach(function(id) {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });
});

renderActionBar();
init();
</script>
